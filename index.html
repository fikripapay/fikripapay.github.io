<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator SMM Pro - Multi Mode</title>
    <!-- Import Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-light: #818cf8;
            --primary-dark: #3730a3;
            --secondary: #6366f1;
            --accent: #f59e0b;
            --bg-body: #0f172a;
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --success: #10b981;
            --danger: #ef4444;
            --radius-lg: 20px;
            --radius-md: 12px;
            --shadow-lg: 0 20px 25px -5px rgb(0 0 0 / 0.15), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            line-height: 1.6;
            padding: 40px 20px;
            background-image: radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                              radial-gradient(at 50% 0%, hsla(225,39%,20%,1) 0, transparent 50%), 
                              radial-gradient(at 100% 0%, hsla(339,49%,20%,1) 0, transparent 50%);
            background-attachment: fixed;
            min-height: 100vh;
            overflow-x: hidden;
            animation: gradientBG 15s ease infinite;
            background-size: 200% 200%;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            animation: fadeInPage 0.8s ease-out forwards;
        }

        @keyframes fadeInPage {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Header Section --- */
        header {
            text-align: center;
            margin-bottom: 50px;
            color: white;
        }

        header h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            margin-bottom: 12px;
            background: linear-gradient(to right, #ffffff, #a5b4fc, #ffffff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shineText 5s linear infinite;
        }

        @keyframes shineText {
            to { background-position: 200% center; }
        }

        header p {
            color: #c7d2fe;
            font-size: 1.2rem;
            opacity: 0.8;
        }

        /* --- Selection Screen --- */
        .selection-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 20px;
        }

        .mode-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px;
            border-radius: var(--radius-lg);
            text-align: center;
            color: white;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .mode-card:hover {
            transform: scale(1.05) translateY(-10px);
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--primary-light);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .mode-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.4);
        }

        .mode-card h2 {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .mode-card p {
            font-size: 0.95rem;
            color: #c7d2fe;
        }

        /* --- Calculator UI --- */
        .glass-card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(12px);
            border-radius: var(--radius-lg);
            padding: 40px;
            box-shadow: var(--shadow-lg);
            border: 1px solid rgba(255, 255, 255, 0.4);
            margin-bottom: 40px;
            display: none; /* Hidden by default */
        }

        .grid-inputs {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        label {
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 10px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-prefix {
            position: absolute;
            left: 18px;
            color: var(--text-muted);
            font-weight: 700;
        }

        input {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: 1.05rem;
            transition: all 0.3s ease;
            outline: none;
            background: #f8fafc;
        }

        input.with-prefix { padding-left: 52px; }

        input:focus {
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 5px rgba(79, 70, 229, 0.1);
        }

        /* --- Qty List --- */
        .qty-list-container { display: flex; flex-direction: column; gap: 12px; }
        .qty-row { display: flex; gap: 10px; animation: slideInDown 0.3s ease-out; }
        
        @keyframes slideInDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .btn-qty-action {
            width: 50px;
            background: white;
            border: 2px solid var(--border-color);
            border-radius: var(--radius-md);
            color: var(--text-muted);
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-qty-action:hover { border-color: var(--primary); color: var(--primary); background: #f5f3ff; }
        .btn-remove:hover { border-color: var(--danger); color: var(--danger); background: #fef2f2; }

        .btn-add-more {
            background: transparent;
            border: 2px dashed var(--border-color);
            color: var(--primary);
            width: 100%;
            padding: 12px;
            font-weight: 600;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-add-more:hover { border-color: var(--primary); background: rgba(79, 70, 229, 0.05); }

        /* --- Buttons --- */
        .actions { display: flex; gap: 20px; margin-top: 40px; }
        
        button.main-btn {
            cursor: pointer;
            padding: 16px 32px;
            border-radius: var(--radius-md);
            font-weight: 800;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            position: relative;
            overflow: hidden;
        }

        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; flex: 2; box-shadow: 0 8px 20px rgba(79, 70, 229, 0.3); }
        .btn-primary:hover:not(:disabled) { transform: scale(1.02) translateY(-3px); box-shadow: 0 12px 30px rgba(79, 70, 229, 0.4); }
        .btn-primary:disabled { opacity: 0.8; cursor: not-allowed; }

        .btn-outline { background-color: white; border: 2px solid var(--border-color); color: var(--text-muted); flex: 1; }
        .btn-outline:hover { background-color: #f1f5f9; color: var(--text-main); transform: translateY(-2px); }

        .btn-back {
            background: transparent;
            color: #c7d2fe;
            border: 1px solid rgba(255,255,255,0.3);
            margin-bottom: 20px;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.85rem;
            cursor: pointer;
            display: none;
            transition: all 0.3s;
        }
        .btn-back:hover { background: rgba(255,255,255,0.1); border-color: white; color: white; }

        .spinner { width: 20px; height: 20px; border: 3px solid rgba(255, 255, 255, 0.3); border-radius: 50%; border-top-color: #fff; animation: spin 0.8s linear infinite; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- Results --- */
        .results-card { background: white; border-radius: var(--radius-lg); padding: 40px; box-shadow: var(--shadow-lg); }
        .table-header h2 { font-size: 1.6rem; font-weight: 800; margin-bottom: 30px; }
        .table-container { overflow-x: auto; border-radius: var(--radius-md); border: 1px solid var(--border-color); background: #fafafa; }
        
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th { background-color: #f1f5f9; padding: 20px 16px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; font-size: 0.75rem; text-align: left; border-bottom: 2px solid var(--border-color); }
        td { padding: 18px 16px; border-bottom: 1px solid var(--border-color); vertical-align: middle; }
        
        tr.row-anim { opacity: 0; transform: translateY(15px); animation: rowAppear 0.5s ease-out forwards; }
        @keyframes rowAppear { to { opacity: 1; transform: translateY(0); } }

        .price-final { font-weight: 900; font-size: 1.15rem; color: var(--primary); }
        .profit-text { font-weight: 700; color: var(--success); }
        .badge-fee { background: #fee2e2; color: var(--danger); padding: 6px 12px; border-radius: 30px; font-size: 0.8rem; font-weight: 800; }
        .badge-adj { background: #dcfce7; color: #15803d; padding: 6px 12px; border-radius: 30px; font-size: 0.8rem; font-weight: 800; }
        .badge-ratio { background: #fef3c7; color: #92400e; padding: 4px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: 700; }

        #toast { visibility: hidden; min-width: 300px; background-color: #1e293b; color: #fff; text-align: center; border-radius: 60px; padding: 18px 30px; position: fixed; z-index: 1000; left: 50%; bottom: 30px; transform: translateX(-50%); font-size: 1rem; font-weight: 600; box-shadow: 0 15px 35px rgba(0,0,0,0.3); opacity: 0; transition: all 0.4s ease; }
        #toast.show { visibility: visible; opacity: 1; bottom: 50px; }

        @media (max-width: 768px) {
            header h1 { font-size: 2.2rem; }
            .glass-card { padding: 25px; }
            .actions { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <button class="btn-back" id="btnBack" onclick="goHome()">← KEMBALI KE MENU</button>
            <h1>Kalkulator SMM Pro</h1>
            <p id="subHeader">Pilih platform penjualan Anda untuk memulai</p>
        </header>

        <!-- Selection Screen -->
        <div id="selectionScreen" class="selection-grid">
            <div class="mode-card" onclick="selectMode('shopee')">
                <div class="mode-icon">
                    <svg width="40" height="40" fill="none" stroke="white" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                </div>
                <h2>Kalkulator Shopee</h2>
                <p>Mencakup Admin 9.5%, Biaya Proses, & Proteksi Rasio 1:7</p>
            </div>
            <div class="mode-card" onclick="selectMode('general')">
                <div class="mode-icon">
                    <svg width="40" height="40" fill="none" stroke="white" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </div>
                <h2>Luar Shopee</h2>
                <p>Perhitungan bersih tanpa biaya admin atau proteksi tambahan</p>
            </div>
        </div>

        <!-- Calculator UI -->
        <div id="calculatorScreen" class="glass-card">
            <div class="grid-inputs">
                <div class="form-group">
                    <label for="supplierPrice">
                        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                        Harga Supplier (per 1.000)
                    </label>
                    <div class="input-wrapper">
                        <span class="input-prefix">Rp</span>
                        <input type="text" id="supplierPrice" class="with-prefix" placeholder="Contoh: 2.500" oninput="handleInputRupiah(this)">
                    </div>
                </div>

                <div class="form-group">
                    <label>
                        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
                        Kuantitas Pesanan
                    </label>
                    <div id="qtyList" class="qty-list-container"></div>
                    <button class="btn-add-more" onclick="addQtyRow()">+ Tambah Baris Jumlah</button>
                </div>
            </div>

            <div class="actions">
                <button class="main-btn btn-primary" id="btnCalculate" onclick="handleCalculation()">
                    <span id="btnText">HITUNG HARGA JUAL</span>
                    <div class="spinner" id="btnLoader"></div>
                    <svg id="btnIcon" width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 7l5 5m0 0l-5 5m5-5H6"></path></svg>
                </button>
                <button class="main-btn btn-outline" onclick="resetForm()">REFRESH</button>
            </div>
        </div>

        <!-- Results Area -->
        <div id="resultsArea" style="display: none; margin-top: 40px;">
            <div class="summary-banner" id="summaryBox"></div>
            <div class="results-card">
                <div class="table-header">
                    <h2 id="tableTitle">Rincian Pricing</h2>
                </div>
                <div class="table-container">
                    <table id="resultsTable">
                        <thead id="tableHead"></thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="toast">Berhasil diproses!</div>

    <script>
        const FEE_ADMIN_PERCENT = 0.095;
        const FEE_PROCESS_FLAT = 1250;
        const THRESHOLD_PROCESS_FEE = 2000;
        
        let currentMode = '';

        function selectMode(mode) {
            currentMode = mode;
            document.getElementById('selectionScreen').style.display = 'none';
            document.getElementById('calculatorScreen').style.display = 'block';
            document.getElementById('btnBack').style.display = 'inline-block';
            
            const sub = document.getElementById('subHeader');
            sub.innerText = mode === 'shopee' ? 'Mode Shopee: Dilengkapi biaya admin & proteksi rasio' : 'Mode Luar Shopee: Perhitungan margin murni';
            
            // Inisialisasi baris kosong jika belum ada
            const list = document.getElementById('qtyList');
            if (list.children.length === 0) addQtyRow("");
        }

        function goHome() {
            currentMode = '';
            document.getElementById('selectionScreen').style.display = 'grid';
            document.getElementById('calculatorScreen').style.display = 'none';
            document.getElementById('resultsArea').style.display = 'none';
            document.getElementById('btnBack').style.display = 'none';
            document.getElementById('subHeader').innerText = 'Pilih platform penjualan Anda untuk memulai';
            resetForm();
        }

        function addQtyRow(value = "") {
            const container = document.getElementById('qtyList');
            const row = document.createElement('div');
            row.className = 'qty-row';
            row.innerHTML = `<input type="number" class="qty-input" placeholder="Jumlah" value="${value}"><button class="btn-qty-action btn-remove" onclick="removeQtyRow(this)">-</button>`;
            container.appendChild(row);
        }

        function removeQtyRow(btn) {
            if (document.getElementById('qtyList').children.length > 1) btn.parentElement.remove();
            else showToast("Minimal satu baris kuantitas");
        }

        function handleInputRupiah(el) {
            let val = el.value.replace(/[^0-9]/g, '');
            el.value = val ? Number(val).toLocaleString('id-ID') : '';
        }

        function parseRawNumber(str) { return parseFloat(str.replace(/\./g, '').replace(/,/g, '')) || 0; }
        function formatIDR(amount) { return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(amount); }

        function getProfit(modal) {
            if (modal < 300) return 200;
            if (modal < 1000) return Math.max(modal * 0.3, 200);
            if (modal < 3000) return Math.max(modal * 0.3, 500);
            if (modal < 10000) return Math.max(modal * 0.25, 1000);
            return modal * 0.2;
        }

        function naturalRounding(price) {
            return price < 1000 ? Math.ceil(price / 50) * 50 : Math.ceil(price / 100) * 100;
        }

        function handleCalculation() {
            const supplierPrice = parseRawNumber(document.getElementById('supplierPrice').value);
            if (supplierPrice <= 0) { showToast("Masukkan harga supplier valid"); return; }

            const qtyInputs = document.querySelectorAll('.qty-input');
            let activeQtys = [];
            qtyInputs.forEach(i => { if (parseInt(i.value) > 0) activeQtys.push(parseInt(i.value)); });
            if (activeQtys.length === 0) { showToast("Masukkan kuantitas"); return; }
            activeQtys.sort((a, b) => a - b);

            const btn = document.getElementById('btnCalculate');
            btn.disabled = true;
            document.getElementById('btnText').innerText = "MENGANALISA...";
            document.getElementById('btnLoader').style.display = "block";
            document.getElementById('btnIcon').style.display = "none";

            setTimeout(() => {
                performCalculate(supplierPrice, activeQtys);
                btn.disabled = false;
                document.getElementById('btnText').innerText = "HITUNG HARGA JUAL";
                document.getElementById('btnLoader').style.display = "none";
                document.getElementById('btnIcon').style.display = "block";
            }, 800);
        }

        function performCalculate(supplierPrice, activeQtys) {
            const tableBody = document.getElementById('tableBody');
            const tableHead = document.getElementById('tableHead');
            const summaryBox = document.getElementById('summaryBox');
            tableBody.innerHTML = '';
            
            // Render Head berdasarkan mode
            if (currentMode === 'shopee') {
                tableHead.innerHTML = `<tr><th>Jumlah</th><th>Modal</th><th>Profit Bersih</th><th>Admin (9.5%)</th><th>Biaya Proses</th><th>Penyesuaian Rasio</th><th>Harga Jual Final</th></tr>`;
            } else {
                tableHead.innerHTML = `<tr><th>Jumlah</th><th>Modal</th><th>Profit</th><th>Harga Jual Final</th></tr>`;
            }

            let results = [];
            let anyHitsThreshold = false;

            activeQtys.forEach(qty => {
                const modal = (supplierPrice / 1000) * qty;
                const profit = getProfit(modal);
                const beforeFee = modal + profit;
                const trialFinal = beforeFee / (1 - FEE_ADMIN_PERCENT);
                if (trialFinal >= THRESHOLD_PROCESS_FEE) anyHitsThreshold = true;
                results.push({ qty, modal, profit, beforeFee, finalPrice: 0, ratioAdj: 0, isAdj: false });
            });

            if (currentMode === 'shopee') {
                const globalFee = anyHitsThreshold ? FEE_PROCESS_FLAT : 0;
                let maxF = 0;
                results.forEach(res => {
                    res.finalPrice = (res.beforeFee + globalFee) / (1 - FEE_ADMIN_PERCENT);
                    if (res.finalPrice > maxF) maxF = res.finalPrice;
                });

                if (maxF <= 1000) {
                    const minGaps = [100, 150, 200, 250, 300]; 
                    for (let i = 1; i < results.length; i++) {
                        const gap = minGaps[i - 1] || 100;
                        if (results[i].finalPrice - results[i - 1].finalPrice < gap) {
                            results[i].finalPrice = results[i - 1].finalPrice + gap;
                            res.isAdj = true;
                        }
                    }
                    results.forEach(res => {
                        const r = naturalRounding(res.finalPrice);
                        if (r > res.finalPrice) { res.finalPrice = r; res.isAdj = true; }
                    });
                }

                const minAllowed = results[results.length - 1].finalPrice / 7;
                if (results[0].finalPrice < minAllowed) {
                    const factor = minAllowed / results[0].finalPrice;
                    for (let i = 0; i < results.length - 1; i++) {
                        const old = results[i].finalPrice;
                        let sc = Math.ceil(old * factor);
                        results[i].ratioAdj = sc - old;
                        results[i].finalPrice = sc;
                    }
                }

                summaryBox.innerHTML = `<strong>Ringkasan Strategi Shopee:</strong> Harga Dasar: ${formatIDR(supplierPrice)}/1.000. ${anyHitsThreshold ? 'Pemicu Biaya Proses Aktif.' : 'Biaya Proses Rp0.'}`;

                results.forEach((res, index) => {
                    const fP = Math.ceil(res.finalPrice);
                    const adm = fP * FEE_ADMIN_PERCENT;
                    const row = document.createElement('tr');
                    row.className = 'row-anim';
                    row.style.animationDelay = `${index * 0.08}s`;
                    row.innerHTML = `<td><strong>${res.qty.toLocaleString('id-ID')}</strong></td><td>${formatIDR(res.modal)}</td><td class="profit-text">${formatIDR(fP - adm - globalFee - res.modal)}</td><td><span class="badge-fee">${formatIDR(adm)}</span></td><td>${globalFee > 0 ? `<span class="badge-fee" style="background:#e0f2fe; color:#0369a1;">${formatIDR(globalFee)}</span>` : '<span class="badge-none">Rp0</span>'}</td><td>${res.ratioAdj > 0 ? `<span class="badge-ratio">+${Math.round(res.ratioAdj).toLocaleString('id-ID')}</span>` : '-'}</td><td class="price-final">${formatIDR(fP)} ${res.isAdj || res.ratioAdj > 0 ? '<span class="badge-adj">Adj</span>' : ''}</td>`;
                    tableBody.appendChild(row);
                });
            } else {
                // Mode General
                summaryBox.innerHTML = `<strong>Ringkasan Strategi:</strong> Menghitung harga jual murni (Modal + Profit) tanpa biaya marketplace.`;
                results.forEach((res, index) => {
                    const final = res.modal + res.profit;
                    const row = document.createElement('tr');
                    row.className = 'row-anim';
                    row.style.animationDelay = `${index * 0.08}s`;
                    row.innerHTML = `<td><strong>${res.qty.toLocaleString('id-ID')}</strong></td><td>${formatIDR(res.modal)}</td><td class="profit-text">${formatIDR(res.profit)}</td><td class="price-final">${formatIDR(final)}</td>`;
                    tableBody.appendChild(row);
                });
            }

            document.getElementById('resultsArea').style.display = 'block';
            window.scrollTo({ top: document.getElementById('resultsArea').offsetTop - 20, behavior: 'smooth' });
        }

        function resetForm() {
            document.getElementById('supplierPrice').value = '';
            document.getElementById('qtyList').innerHTML = '';
            addQtyRow("");
            document.getElementById('resultsArea').style.display = 'none';
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.classList.add("show");
            setTimeout(() => t.classList.remove("show"), 3000);
        }

        document.addEventListener('keypress', e => { if (e.key === 'Enter') handleCalculation(); });
    </script>
</body>
</html>
