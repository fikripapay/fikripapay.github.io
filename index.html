<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mohon tunggu... mengalihkan halaman</title>
    <!-- Google Fonts: Plus Jakarta Sans untuk tipografi premium -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      /* CSS Reset & Variabel */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Plus Jakarta Sans", sans-serif;
        -webkit-tap-highlight-color: transparent;
      }

      :root {
        --bg-primary: #0a090f;
        --bg-secondary: #12101a;
        --accent-orange: #ee4d2d; /* Shopee Orange */
        --accent-luxury: #ff8a00; /* Warm Luxury Gold/Orange */
        --text-muted: #94a3b8;
        --text-light: #f8fafc;
        --glass-bg: rgba(18, 16, 26, 0.6);
        --glass-border: rgba(255, 255, 255, 0.08);
      }

      body {
        background-color: var(--bg-primary);
        color: var(--text-light);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        position: relative;
        padding: 20px;
      }

      /* Desain Background Glow & Ambient */
      .ambient-glow-1 {
        position: absolute;
        width: 300px;
        height: 300px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(238, 77, 45, 0.15) 0%,
          rgba(0, 0, 0, 0) 70%
        );
        top: -50px;
        left: -50px;
        filter: blur(40px);
        z-index: 1;
        animation: pulse-glow 8s infinite alternate;
      }

      .ambient-glow-2 {
        position: absolute;
        width: 350px;
        height: 350px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(255, 138, 0, 0.12) 0%,
          rgba(0, 0, 0, 0) 70%
        );
        bottom: -50px;
        right: -50px;
        filter: blur(50px);
        z-index: 1;
        animation: pulse-glow 10s infinite alternate-reverse;
      }

      /* Card Container Utama (Tengah Layar) */
      .redirect-card {
        background: var(--glass-bg);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid var(--glass-border);
        border-radius: 28px;
        padding: 40px 30px;
        width: 100%;
        max-width: 420px;
        text-align: center;
        box-shadow:
          0 20px 50px rgba(0, 0, 0, 0.4),
          inset 0 1px 0 rgba(255, 255, 255, 0.1);
        z-index: 2;
        opacity: 0;
        transform: translateY(20px);
        animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      /* Animasi Masuk */
      @keyframes fadeIn {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes pulse-glow {
        0% {
          transform: scale(1);
          opacity: 0.8;
        }
        100% {
          transform: scale(1.15);
          opacity: 1;
        }
      }

      /* Ikon Belanja Minimalis */
      .logo-container {
        width: 64px;
        height: 64px;
        background: linear-gradient(
          135deg,
          var(--accent-orange),
          var(--accent-luxury)
        );
        border-radius: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 24px auto;
        box-shadow: 0 8px 24px rgba(238, 77, 45, 0.3);
        animation: float 4s ease-in-out infinite;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-8px);
        }
      }

      .shopee-icon-svg {
        width: 32px;
        height: 32px;
        fill: white;
      }

      /* Elemen Teks */
      h1 {
        font-size: 24px;
        font-weight: 700;
        letter-spacing: -0.5px;
        margin-bottom: 8px;
        background: linear-gradient(135deg, #ffffff 60%, #cbd5e1 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .subtext {
        font-size: 14px;
        color: var(--text-muted);
        line-height: 1.6;
        margin-bottom: 30px;
      }

      /* Desain Countdown Circular */
      .countdown-container {
        position: relative;
        width: 110px;
        height: 110px;
        margin: 0 auto 30px auto;
      }

      .countdown-svg {
        width: 100%;
        height: 100%;
        transform: rotate(-90deg);
      }

      .countdown-circle-bg {
        fill: none;
        stroke: rgba(255, 255, 255, 0.05);
        stroke-width: 5;
      }

      .countdown-circle-progress {
        fill: none;
        stroke: url(#orange-gradient);
        stroke-width: 5;
        stroke-linecap: round;
        /* Keliling lingkaran = 2 * PI * r => 2 * 3.14159 * 48 = ~301.6 */
        stroke-dasharray: 301.6;
        stroke-dashoffset: 0;
        transition: stroke-dashoffset 1s linear;
      }

      .countdown-number {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 36px;
        font-weight: 800;
        color: #ffffff;
        text-shadow: 0 4px 12px rgba(238, 77, 45, 0.2);
      }

      .warning-text {
        font-size: 11px;
        font-weight: 500;
        color: var(--text-muted);
        letter-spacing: 1px;
        text-transform: uppercase;
        margin-bottom: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }

      .pulse-dot {
        width: 6px;
        height: 6px;
        background-color: #ef4444;
        border-radius: 50%;
        display: inline-block;
        animation: pulse-dot 1.5s infinite;
      }

      @keyframes pulse-dot {
        0%,
        100% {
          opacity: 0.3;
          transform: scale(0.9);
        }
        50% {
          opacity: 1;
          transform: scale(1.2);
        }
      }

      /* Tombol Aksi */
      .btn-redirect {
        width: 100%;
        padding: 16px 24px;
        border: none;
        border-radius: 16px;
        font-size: 14px;
        font-weight: 600;
        cursor: not-allowed;
        transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        position: relative;
        overflow: hidden;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        background: rgba(255, 255, 255, 0.04);
        color: rgba(255, 255, 255, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      /* State Aktif Tombol */
      .btn-redirect.active {
        cursor: pointer;
        background: linear-gradient(
          135deg,
          var(--accent-orange),
          var(--accent-luxury)
        );
        color: #ffffff;
        box-shadow: 0 10px 25px rgba(238, 77, 45, 0.3);
        border: none;
      }

      .btn-redirect.active:hover {
        transform: translateY(-2px);
        box-shadow: 0 14px 30px rgba(238, 77, 45, 0.45);
      }

      .btn-redirect.active:active {
        transform: translateY(0);
      }

      /* Efek Shimmer Kilatan pada Tombol Aktif */
      .btn-redirect.active::after {
        content: "";
        position: absolute;
        top: -50%;
        left: -60%;
        width: 30%;
        height: 200%;
        background: rgba(255, 255, 255, 0.25);
        transform: rotate(30deg);
        animation: shimmer 3s infinite;
      }

      @keyframes shimmer {
        0% {
          left: -60%;
        }
        30% {
          left: 140%;
        }
        100% {
          left: 140%;
        }
      }

      /* Footer Kaki Halaman */
      .footer-text {
        position: absolute;
        bottom: 24px;
        font-size: 11px;
        color: rgba(255, 255, 255, 0.2);
        font-weight: 400;
        letter-spacing: 0.5px;
        z-index: 2;
        text-align: center;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <!-- Ambient Backlight Effects -->
    <div class="ambient-glow-1"></div>
    <div class="ambient-glow-2"></div>

    <!-- Container Card Utama -->
    <div class="redirect-card">
      <!-- Logo / Icon Minimalis -->
      <div class="logo-container">
        <svg
          class="shopee-icon-svg"
          viewBox="0 0 24 24"
          xmlns="http://www.w3.org/2000/svg"
        >
          <!-- Tas Belanja Elegan Minimalis -->
          <path
            d="M19 6h-2c0-2.76-2.24-5-5-5S7 3.24 7 6H5c-1.1 0-1.99.9-1.99 2L3 20c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-7-3c1.66 0 3 1.34 3 3H9c0-1.66 1.34-3 3-3zm0 10c-2.76 0-5-2.24-5-5h2c0 1.66 1.34 3 3 3s3-1.34 3-3h2c0 2.76-2.24 5-5 5z"
          />
        </svg>
      </div>

      <!-- Teks Informasi -->
      <h1 id="title-text">Mohon tunggu...</h1>
      <p class="subtext">Halaman akan mengarah ke halaman berikutnya.</p>

      <!-- Lingkaran Countdown -->
      <div class="countdown-container">
        <svg class="countdown-svg">
          <defs>
            <linearGradient
              id="orange-gradient"
              x1="0%"
              y1="0%"
              x2="100%"
              y2="100%"
            >
              <stop offset="0%" stop-color="#ee4d2d" />
              <stop offset="100%" stop-color="#ff8a00" />
            </linearGradient>
          </defs>
          <circle class="countdown-circle-bg" cx="55" cy="55" r="48"></circle>
          <circle
            id="progress-circle"
            class="countdown-circle-progress"
            cx="55"
            cy="55"
            r="48"
          ></circle>
        </svg>
        <div id="countdown-number" class="countdown-number">3</div>
      </div>

      <!-- Warning Info -->
      <div class="warning-text">
        <span class="pulse-dot"></span>
        Jangan tutup halaman ini
      </div>

      <!-- Tombol Cadangan -->
      <button id="redirect-btn" class="btn-redirect" disabled>
        Tunggu beberapa detik...
      </button>
    </div>

    <!-- Minimalist Footer -->

    <!-- Sistem Kontrol Countdown & Pengalihan otomatis -->
    <script>
      // ATUR LINK AFFILIATE ANDA DI SINI
      const TARGET_URL = "https://s.shopee.co.id/6Ahx7jZ63O";

      const countdownNumberEl = document.getElementById("countdown-number");
      const progressCircle = document.getElementById("progress-circle");
      const redirectBtn = document.getElementById("redirect-btn");
      const titleText = document.getElementById("title-text");

      let duration = 3; // Durasi hitung mundur dalam detik
      const totalDuration = duration;
      const maxOffset = 301.6; // Keliling lingkaran SVG r=48

      // Pasang dasharray awal pada SVG progress
      progressCircle.style.strokeDasharray = maxOffset;
      progressCircle.style.strokeDashoffset = 0;

      // Fungsi memperbarui animasi lingkaran progress
      function updateCircle(timeLeft) {
        const percentage = timeLeft / totalDuration;
        const offset = maxOffset * (1 - percentage);
        progressCircle.style.strokeDashoffset = offset;
      }

      // Loop interval countdown 1 detik sekali
      const timer = setInterval(() => {
        duration--;

        if (duration >= 0) {
          countdownNumberEl.textContent = duration;
          updateCircle(duration);
        }

        if (duration <= 0) {
          clearInterval(timer);
          activateRedirect();
        }
      }, 1000);

      // Eksekusi ketika countdown selesai
      function activateRedirect() {
        // Ubah teks status di atas
        titleText.textContent = "Mengalihkan...";

        // Aktifkan tombol cadangan secara penuh
        redirectBtn.removeAttribute("disabled");
        redirectBtn.classList.add("active");
        redirectBtn.textContent = "Klik di sini apabila redirect tidak terjadi";

        // Pasang fungsi klik manual ke target link
        redirectBtn.addEventListener("click", () => {
          goToTarget();
        });

        // Lakukan pengalihan otomatis secara instan
        goToTarget();
      }

      // Fungsi pusat pengalihan url
      function goToTarget() {
        window.location.href = TARGET_URL;
      }
    </script>
  </body>
</html>
